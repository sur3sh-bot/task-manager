<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskMaster</title>

  <style>
    body {
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  margin-top: 50px;
  color: white;
}

.container {
  background: #ffffff;
  color: black;
}
    h2 {
      text-align: center;
    }

    input {
      width: 70%;
      padding: 8px;
    }

    button {
      padding: 8px;
      cursor: pointer;
    }

    .filters {
      margin-top: 15px;
      text-align: center;
    }

    .filters button {
      margin: 3px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    .completed {
      text-decoration: line-through;
      color: gray;
    }

    .actions button {
      margin-left: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>TaskMaster</h2>

  <!-- Add Task -->
  <div>
    <input id="taskInput" placeholder="New task..." />
    <input type="date" id="dueDateInput" />
    <button onclick="addTask()">Add</button>
  </div>

  <!-- Filters (FIXED POSITION) -->
  <div class="filters">
    <button onclick="setFilter('all')">All</button>
    <button onclick="setFilter('completed')">Completed</button>
    <button onclick="setFilter('pending')">Pending</button>
  </div>

  <!-- Task List -->
  <ul id="taskList"></ul>
</div>

<script>
  const API_URL = "http://localhost:3000/tasks";
  let currentFilter = 'all';

  // Fetch tasks
  async function fetchTasks() {
    const res = await fetch(API_URL);
    const tasks = await res.json();
    renderTasks(tasks);
  }

  // Render tasks with filter
  function renderTasks(tasks) {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  const filteredTasks = tasks.filter(task => {
    if (currentFilter === 'completed') return task.completed;
    if (currentFilter === 'pending') return !task.completed;
    return true;
  });

  filteredTasks.forEach(task => {
    const li = document.createElement("li");

    
    const today = new Date().toISOString().split('T')[0];
    if (task.dueDate && task.dueDate < today && !task.completed) {
      li.style.color = "red";
    }

    
    const title = document.createElement("span");
    title.textContent = task.title;
    if (task.completed) title.classList.add("completed");

    
    const date = document.createElement("small");
    if (task.dueDate) {
      date.textContent = "Due: " + task.dueDate;
    }

    
    const actions = document.createElement("div");
    actions.classList.add("actions");

    const toggleBtn = document.createElement("button");
    toggleBtn.textContent = "✔";
    toggleBtn.onclick = () => toggleTask(task);

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "🗑";
    deleteBtn.onclick = () => deleteTask(task.id);

    actions.appendChild(toggleBtn);
    actions.appendChild(deleteBtn);

    
    li.appendChild(title);
    li.appendChild(date);
    li.appendChild(actions);

    list.appendChild(li);
  });
}

  // Add task
  async function addTask() {
  const input = document.getElementById("taskInput");
  const title = input.value;
  const dueDate = document.getElementById("dueDateInput").value; // ✅ added

  if (!title) return alert("Enter a task!");

  await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title, dueDate }) // ✅ updated
  });

  input.value = "";
  document.getElementById("dueDateInput").value = ""; // optional reset
  fetchTasks();
}
  // Toggle task
  async function toggleTask(task) {
    await fetch(`${API_URL}/${task.id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ completed: !task.completed })
    });

    fetchTasks();
  }

  // Delete task (FIXED)
  async function deleteTask(id) {
    await fetch(`${API_URL}/${id}`, {
      method: "DELETE"
    });

    fetchTasks();
  }

  // Set filter
  function setFilter(filter) {
    currentFilter = filter;
    fetchTasks();
  }

  // Initial load
  fetchTasks();
</script>

</body>
</html>
