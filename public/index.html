<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskMaster</title>

  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-alt: #fbfcff;
      --input-bg: #ffffff;
      --text: #19202e;
      --muted: #667085;
      --border: #dde3ee;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #148f5b;
      --danger: #d92d20;
      --warning: #b54708;
      --shadow: 0 18px 45px rgba(31, 41, 55, 0.12);

      --tag-bg: #eef2f7;
      --tag-overdue-bg: #fff1eb;
      --tag-done-bg: #eaf7f0;
      --danger-bg: #fff1f0;
      --filters-bg: #f7f9fc;
      --date-pill-bg: rgba(255, 255, 255, 0.75);
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-alt: #0f172a;
      --input-bg: #0f172a;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: #334155;
      --primary: #3b82f6;
      --primary-dark: #60a5fa;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.4);

      --tag-bg: #334155;
      --tag-overdue-bg: rgba(239, 68, 68, 0.15);
      --tag-done-bg: rgba(16, 185, 129, 0.15);
      --danger-bg: rgba(239, 68, 68, 0.1);
      --filters-bg: #0f172a;
      --date-pill-bg: rgba(30, 41, 59, 0.75);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(120deg, rgba(37, 99, 235, 0.12), rgba(20, 143, 91, 0.08)),
        var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .app {
      width: min(980px, calc(100% - 32px));
      margin: 40px auto;
    }

    .hero {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 54px);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 520px;
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .date-pill {
      flex: 0 0 auto;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--date-pill-bg);
      padding: 10px 14px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .composer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 170px auto;
      gap: 12px;
      padding: 18px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-alt);
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      font: inherit;
      padding: 0 13px;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.16);
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .primary-btn {
      background: var(--primary);
      color: #ffffff;
      padding: 0 20px;
    }

    .primary-btn:hover {
      background: var(--primary-dark);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .stat {
      min-width: 105px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--panel);
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--filters-bg);
    }

    .filter-btn {
      min-height: 36px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      padding: 0 13px;
    }

    .filter-btn.active {
      border-color: var(--border);
      background: var(--panel);
      color: var(--text);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.08);
    }

    .message {
      display: none;
      margin: 0;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      color: var(--danger);
      background: var(--danger-bg);
      font-weight: 700;
    }

    .message.show {
      display: block;
    }

    .task-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .task-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      gap: 14px;
      align-items: center;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }

    .task-item:last-child {
      border-bottom: 0;
    }

    .task-item.editing .task-content {
      grid-column: 2 / -1;
    }

    .task-check {
      width: 30px;
      height: 30px;
      min-height: 30px;
      border: 2px solid var(--border);
      border-radius: 50%;
      background: var(--panel);
      color: transparent;
      line-height: 1;
    }

    .task-check.done {
      border-color: var(--success);
      background: var(--success);
      color: #ffffff;
    }

    .task-title {
      margin: 0;
      overflow-wrap: anywhere;
      font-weight: 800;
      line-height: 1.35;
    }

    .task-title.completed {
      color: var(--muted);
      text-decoration: line-through;
    }

    .edit-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 160px auto auto;
      gap: 10px;
      align-items: center;
    }

    .edit-form input {
      min-height: 40px;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .tag {
      border-radius: 999px;
      background: var(--tag-bg);
      padding: 4px 9px;
      font-weight: 700;
    }

    .tag.overdue {
      background: var(--tag-overdue-bg);
      color: var(--danger);
    }

    .tag.done {
      background: var(--tag-done-bg);
      color: var(--success);
    }

    .delete-btn {
      min-width: 82px;
      background: var(--danger-bg);
      color: var(--danger);
      padding: 0 13px;
    }

    .edit-btn,
    .save-btn,
    .cancel-btn {
      min-width: 72px;
      padding: 0 13px;
    }

    .edit-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
    }

    .save-btn {
      background: var(--success);
      color: #ffffff;
    }

    .cancel-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
    }

    .empty {
      padding: 46px 18px;
      text-align: center;
      color: var(--muted);
    }

    .empty strong {
      display: block;
      margin-bottom: 7px;
      color: var(--text);
      font-size: 18px;
    }

    .theme-toggle {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .theme-toggle:hover {
      background: var(--tag-bg);
      color: var(--text);
    }

    @media (max-width: 720px) {
      .app {
        width: min(100% - 20px, 980px);
        margin: 20px auto;
      }

      .hero {
        align-items: flex-start;
        flex-direction: column;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .stats,
      .filters {
        width: 100%;
      }

      .stat {
        flex: 1;
        min-width: 0;
      }

      .filter-btn {
        flex: 1;
        padding: 0 8px;
      }

      .task-item {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .edit-form {
        grid-template-columns: 1fr;
      }

      .edit-btn,
      .delete-btn {
        justify-self: start;
      }

      .edit-btn {
        grid-column: 2;
      }

      .delete-btn {
        grid-column: 2;
        margin-left: 86px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">Daily planner</p>
        <h1>TaskMaster</h1>
        <p class="subtitle">Plan your tasks, track due dates, and keep completed work out of your way.</p>
      </div>
      <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end;">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode">
          🌙
        </button>
        <div class="date-pill" id="todayLabel"></div>
      </div>
    </section>

    <section class="panel">
      <form class="composer" id="taskForm">
        <input id="taskInput" placeholder="What needs to be done?" autocomplete="off">
        <input type="date" id="dueDateInput">
        <button class="primary-btn" type="submit">Add Task</button>
      </form>

      <div class="toolbar">
        <div class="stats">
          <div class="stat">
            <strong id="totalCount">0</strong>
            <span>Total</span>
          </div>
          <div class="stat">
            <strong id="pendingCount">0</strong>
            <span>Pending</span>
          </div>
          <div class="stat">
            <strong id="doneCount">0</strong>
            <span>Done</span>
          </div>
        </div>

        <div class="filters" aria-label="Task filters">
          <button class="filter-btn active" type="button" data-filter="all">All</button>
          <button class="filter-btn" type="button" data-filter="pending">Pending</button>
          <button class="filter-btn" type="button" data-filter="today">Today</button>
          <button class="filter-btn" type="button" data-filter="overdue">Overdue</button>
          <button class="filter-btn" type="button" data-filter="upcoming">Upcoming</button>
          <button class="filter-btn" type="button" data-filter="completed">Done</button>
        </div>
      </div>

      <p class="message" id="errorMessage"></p>
      <ul class="task-list" id="taskList"></ul>
    </section>
  </main>

  <script>
    const API_URL = "/tasks";
    const taskForm = document.getElementById("taskForm");
    const taskInput = document.getElementById("taskInput");
    const dueDateInput = document.getElementById("dueDateInput");
    const taskList = document.getElementById("taskList");
    const errorMessage = document.getElementById("errorMessage");
    const filterButtons = document.querySelectorAll(".filter-btn");
    const totalCount = document.getElementById("totalCount");
    const pendingCount = document.getElementById("pendingCount");
    const doneCount = document.getElementById("doneCount");
    const todayLabel = document.getElementById("todayLabel");
    const themeToggle = document.getElementById("themeToggle");

    // Theme logic
    const currentTheme = localStorage.getItem("theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    if (currentTheme === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
      themeToggle.textContent = "☀️";
    }

    themeToggle.addEventListener("click", () => {
      let theme = document.documentElement.getAttribute("data-theme");
      if (theme === "dark") {
        document.documentElement.removeAttribute("data-theme");
        localStorage.setItem("theme", "light");
        themeToggle.textContent = "🌙";
      } else {
        document.documentElement.setAttribute("data-theme", "dark");
        localStorage.setItem("theme", "dark");
        themeToggle.textContent = "☀️";
      }
    });

    let currentFilter = "all";
    let tasksCache = [];
    let editingTaskId = null;

    todayLabel.textContent = new Intl.DateTimeFormat("en", {
      weekday: "short",
      month: "short",
      day: "numeric"
    }).format(new Date());

    taskForm.addEventListener("submit", addTask);

    filterButtons.forEach(button => {
      button.addEventListener("click", () => {
        currentFilter = button.dataset.filter;
        updateActiveFilter();
        renderTasks(tasksCache);
      });
    });

    async function fetchTasks() {
      showError("");

      try {
        const res = await fetch(API_URL);

        if (!res.ok) {
          throw new Error("Could not load tasks.");
        }

        tasksCache = await res.json();
        renderTasks(tasksCache);
      } catch (error) {
        showError("Could not connect to the task server.");
      }
    }

    function renderTasks(tasks) {
      taskList.innerHTML = "";
      updateStats(tasks);

      const filteredTasks = tasks.filter(matchesCurrentFilter);

      if (filteredTasks.length === 0) {
        taskList.appendChild(createEmptyState());
        return;
      }

      filteredTasks
        .sort(compareTasks)
        .forEach(task => taskList.appendChild(createTaskElement(task)));
    }

    function matchesCurrentFilter(task) {
      const today = getTodayDateKey();

      if (currentFilter === "completed") return task.completed;
      if (currentFilter === "pending") return !task.completed;
      if (currentFilter === "today") return !task.completed && task.dueDate === today;
      if (currentFilter === "overdue") return isOverdue(task);
      if (currentFilter === "upcoming") return !task.completed && task.dueDate && task.dueDate > today;
      return true;
    }

    function compareTasks(a, b) {
      const dateComparison = compareDueDates(a.dueDate, b.dueDate);

      if (dateComparison !== 0) {
        return dateComparison;
      }

      if (a.completed !== b.completed) {
        return Number(a.completed) - Number(b.completed);
      }

      return a.id - b.id;
    }

    function compareDueDates(aDate, bDate) {
      if (aDate && bDate) {
        return aDate.localeCompare(bDate);
      }

      if (aDate) return -1;
      if (bDate) return 1;
      return 0;
    }

    function createTaskElement(task) {
      const li = document.createElement("li");
      li.className = "task-item";

      const checkBtn = document.createElement("button");
      checkBtn.className = `task-check ${task.completed ? "done" : ""}`;
      checkBtn.type = "button";
      checkBtn.textContent = task.completed ? "\u2713" : "";
      checkBtn.title = task.completed ? "Mark as pending" : "Mark as done";
      checkBtn.onclick = () => toggleTask(task);

      const content = document.createElement("div");
      content.className = "task-content";

      if (editingTaskId === task.id) {
        li.classList.add("editing");
        content.appendChild(createEditForm(task));
        li.appendChild(checkBtn);
        li.appendChild(content);
        return li;
      }

      const title = document.createElement("p");
      title.className = `task-title ${task.completed ? "completed" : ""}`;
      title.textContent = task.title;

      const meta = document.createElement("div");
      meta.className = "task-meta";

      const status = document.createElement("span");
      status.className = `tag ${task.completed ? "done" : ""}`;
      status.textContent = task.completed ? "Done" : "Pending";
      meta.appendChild(status);

      if (task.dueDate) {
        const dueDate = document.createElement("span");
        dueDate.className = `tag ${isOverdue(task) ? "overdue" : ""}`;
        dueDate.textContent = `${isOverdue(task) ? "Overdue" : "Due"}: ${formatDate(task.dueDate)}`;
        meta.appendChild(dueDate);
      }

      content.appendChild(title);
      content.appendChild(meta);

      const editBtn = document.createElement("button");
      editBtn.className = "edit-btn";
      editBtn.type = "button";
      editBtn.textContent = "Edit";
      editBtn.onclick = () => {
        editingTaskId = task.id;
        renderTasks(tasksCache);
      };

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "delete-btn";
      deleteBtn.type = "button";
      deleteBtn.textContent = "Delete";
      deleteBtn.onclick = () => deleteTask(task.id);

      li.appendChild(checkBtn);
      li.appendChild(content);
      li.appendChild(editBtn);
      li.appendChild(deleteBtn);

      return li;
    }

    function createEditForm(task) {
      const form = document.createElement("form");
      form.className = "edit-form";

      const titleInput = document.createElement("input");
      titleInput.value = task.title;
      titleInput.placeholder = "Task title";
      titleInput.autocomplete = "off";

      const dueInput = document.createElement("input");
      dueInput.type = "date";
      dueInput.value = task.dueDate || "";

      const saveBtn = document.createElement("button");
      saveBtn.className = "save-btn";
      saveBtn.type = "submit";
      saveBtn.textContent = "Save";

      const cancelBtn = document.createElement("button");
      cancelBtn.className = "cancel-btn";
      cancelBtn.type = "button";
      cancelBtn.textContent = "Cancel";
      cancelBtn.onclick = () => {
        editingTaskId = null;
        showError("");
        renderTasks(tasksCache);
      };

      form.addEventListener("submit", event => {
        event.preventDefault();
        updateTask(task, titleInput.value.trim(), dueInput.value);
      });

      form.appendChild(titleInput);
      form.appendChild(dueInput);
      form.appendChild(saveBtn);
      form.appendChild(cancelBtn);

      setTimeout(() => titleInput.focus(), 0);
      return form;
    }

    function createEmptyState() {
      const empty = document.createElement("li");
      empty.className = "empty";
      empty.innerHTML = "<strong>No tasks here</strong><span>Add a new task or switch filters.</span>";
      return empty;
    }

    async function addTask(event) {
      event.preventDefault();

      const title = taskInput.value.trim();
      const dueDate = dueDateInput.value;

      if (!title) {
        showError("Enter a task title first.");
        taskInput.focus();
        return;
      }

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, dueDate })
        });

        if (!res.ok) {
          throw new Error("Could not add task.");
        }

        taskInput.value = "";
        dueDateInput.value = "";
        await fetchTasks();
      } catch (error) {
        showError("Task could not be added.");
      }
    }

    async function toggleTask(task) {
      try {
        const res = await fetch(`${API_URL}/${task.id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ completed: !task.completed })
        });

        if (!res.ok) {
          throw new Error("Could not update task.");
        }

        await fetchTasks();
      } catch (error) {
        showError("Task could not be updated.");
      }
    }

    async function updateTask(task, title, dueDate) {
      if (!title) {
        showError("Enter a task title first.");
        return;
      }

      try {
        const res = await fetch(`${API_URL}/${task.id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, dueDate: dueDate || null })
        });

        if (!res.ok) {
          throw new Error("Could not update task.");
        }

        editingTaskId = null;
        await fetchTasks();
      } catch (error) {
        showError("Task could not be updated.");
      }
    }

    async function deleteTask(id) {
      try {
        const res = await fetch(`${API_URL}/${id}`, {
          method: "DELETE"
        });

        if (!res.ok) {
          throw new Error("Could not delete task.");
        }

        await fetchTasks();
      } catch (error) {
        showError("Task could not be deleted.");
      }
    }

    function updateStats(tasks) {
      totalCount.textContent = tasks.length;
      pendingCount.textContent = tasks.filter(task => !task.completed).length;
      doneCount.textContent = tasks.filter(task => task.completed).length;
    }

    function updateActiveFilter() {
      filterButtons.forEach(button => {
        button.classList.toggle("active", button.dataset.filter === currentFilter);
      });
    }

    function isOverdue(task) {
      const today = getTodayDateKey();
      return task.dueDate && task.dueDate < today && !task.completed;
    }

    function getTodayDateKey() {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");

      return `${year}-${month}-${day}`;
    }

    function formatDate(date) {
      return new Intl.DateTimeFormat("en", {
        month: "short",
        day: "numeric",
        year: "numeric"
      }).format(new Date(`${date}T00:00:00`));
    }

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.toggle("show", Boolean(message));
    }

    fetchTasks();
  </script>
</body>
</html>
